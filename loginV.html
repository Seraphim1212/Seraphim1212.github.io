<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./loginV.css">
    <link rel="stylesheet" href="./styleV.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Jura:wght@300..700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div id="tudo">

        <div id="box-principal">

            <header id="cabecalho">

                <div id="conteudo-cabecalho">

                    <div id="img-tonjut-cabecalho">
                        <img src="../../midia/GIFs/hau.gif" alt="hai.gif">
                        <h3 style="font-size: 25px;" class="fonte-josefin bold">TONJUNFORT</h3>
                    </div>

                    <a style="text-decoration: none;" class="fonte bold" href="#">Sobre Nós</a>
                </div>

            </header>

            <div id="box-direita">

                <h1 style="margin-top: 60px;" class="fonte bold">
                    Login Voluntário
                </h1>

                <form id="box-login">

                    <div id="inputs">

                        <div class="centralizacao-tamanho-inputs" id="box-username">

                            <input class="tamanho-inputs customizacao-inputs" id="input-username" type="text"
                                name="username" placeholder="Nome de Usuário" required>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                                viewBox="0 0 24 24">
                                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                                <path
                                    d="M12 2a5 5 0 1 0 0 10 5 5 0 1 0 0-10M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1">
                                </path>
                            </svg>

                        </div>

                        <div class="centralizacao-tamanho-inputs" id="box-senha">

                            <input class="tamanho-inputs customizacao-inputs" id="input-senha" type="password"
                                name="senha" placeholder="Senha" required>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                                viewBox="0 0 24 24">
                                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                                <path
                                    d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9z">
                                </path>
                            </svg>

                        </div>

                    </div>

                    <div id="lembre-esqueceu" class="fonte">
                        <label><input type="checkbox">Lembre-me
                        </label>

                        <p class="fonte">

                            Esqueceu a Senha? <a class="bold" style="text-decoration: none;" href="#">Clique Aqui</a>

                        </p>
                    </div>

                </form>

                <div id="box-botoes">

                    <button class="fonte" id="botao-voltar">
                        <h3>
                            Voltar
                        </h3>
                    </button>

                    <button class="fonte" id="botao-login" type="submit">
                        <h3>
                            Acessar
                        </h3>
                    </button>

                </div>

                <p class="fonte">
                    Não está cadastrado? <a class="fonte bold" href="./cadastroVol/cadastroV.html" style="text-decoration: none;">Acesse Aqui</a>
                </p>

            </div>

        </div>

    </div>

    <script src="./script.js"></script>
</body>

</html>
